<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bé Giỏi</title>

    <!-- Cài lên màn hình chính iPhone/Android như một app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bé Giỏi" />

    <!-- Splash hiện ngay khi mở app (trước khi JS tải xong), React sẽ thay thế khi mount -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(160deg, #e0f2fe 0%, #ede9fe 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
      }
      #app-splash .splash-rocket {
        font-size: 72px;
        line-height: 1;
        animation: splash-bounce 1.1s ease-in-out infinite;
      }
      #app-splash .splash-title {
        font-size: 26px;
        font-weight: 800;
        color: #7c3aed;
        letter-spacing: 0.5px;
      }
      #app-splash .splash-dots {
        display: flex;
        gap: 8px;
      }
      #app-splash .splash-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #a78bfa;
        animation: splash-blink 1s ease-in-out infinite;
      }
      #app-splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #app-splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0) rotate(-8deg); }
        50% { transform: translateY(-16px) rotate(4deg); }
      }
      @keyframes splash-blink {
        0%, 100% { opacity: 0.3; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-rocket,
        #app-splash .splash-dots span { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="splash-rocket">🚀</div>
        <div class="splash-title">Bé Giỏi</div>
        <div class="splash-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
