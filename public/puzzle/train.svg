<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="train-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfdbfe"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#train-sky)"/>
  <!-- mặt trời -->
  <circle cx="350" cy="56" r="30" fill="#fde047"/>
  <!-- mây -->
  <g fill="#ffffff">
    <circle cx="70" cy="60" r="22"/>
    <circle cx="98" cy="60" r="28"/>
    <circle cx="128" cy="62" r="20"/>
  </g>
  <!-- cỏ nền -->
  <rect x="0" y="316" width="400" height="84" fill="#86efac"/>
  <!-- đường ray -->
  <rect x="0" y="330" width="400" height="10" fill="#78350f"/>
  <rect x="0" y="352" width="400" height="10" fill="#78350f"/>
  <g fill="#a16207">
    <rect x="24" y="330" width="12" height="32"/>
    <rect x="96" y="330" width="12" height="32"/>
    <rect x="168" y="330" width="12" height="32"/>
    <rect x="240" y="330" width="12" height="32"/>
    <rect x="312" y="330" width="12" height="32"/>
    <rect x="368" y="330" width="12" height="32"/>
  </g>
  <!-- khói tròn từ ống khói -->
