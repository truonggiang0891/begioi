    <circle cx="96" cy="60" r="16"/>
    <circle cx="118" cy="42" r="20"/>
    <circle cx="146" cy="30" r="24"/>
  </g>
  <!-- TOA sau (màu vàng) -->
  <rect x="248" y="180" width="130" height="112" rx="16" fill="#f59e0b"/>
  <rect x="262" y="196" width="46" height="46" rx="8" fill="#fef3c7"/>
  <rect x="318" y="196" width="46" height="46" rx="8" fill="#fef3c7"/>
  <rect x="248" y="262" width="130" height="14" fill="#b45309"/>
  <!-- móc nối -->
  <rect x="230" y="256" width="26" height="10" fill="#334155"/>
  <!-- ĐẦU TÀU (thân đỏ) -->
  <rect x="40" y="150" width="176" height="142" rx="20" fill="#ef4444"/>
  <!-- buồng lái xanh -->
  <rect x="40" y="150" width="86" height="142" rx="20" fill="#3b82f6"/>
