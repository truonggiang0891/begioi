  <rect x="58" y="172" width="52" height="48" rx="10" fill="#e0f2fe" stroke="#1d4ed8" stroke-width="5"/>
  <!-- ống khói -->
  <rect x="150" y="96" width="34" height="60" rx="6" fill="#dc2626"/>
  <rect x="142" y="88" width="50" height="18" rx="8" fill="#991b1b"/>
  <!-- dải trang trí thân -->
  <rect x="126" y="228" width="90" height="18" fill="#fbbf24"/>
  <!-- đèn vàng phía trước -->
  <circle cx="200" cy="200" r="20" fill="#fde047" stroke="#f59e0b" stroke-width="5"/>
  <circle cx="200" cy="200" r="7" fill="#fffbeb"/>
  <!-- gầm tàu -->
  <rect x="40" y="286" width="176" height="16" fill="#7f1d1d"/>
  <!-- bánh xe -->
  <g>
    <circle cx="86" cy="308" r="26" fill="#1f2937" stroke="#fbbf24" stroke-width="6"/>
    <circle cx="86" cy="308" r="8" fill="#9ca3af"/>
    <circle cx="170" cy="308" r="26" fill="#1f2937" stroke="#fbbf24" stroke-width="6"/>
    <circle cx="170" cy="308" r="8" fill="#9ca3af"/>
    <circle cx="300" cy="308" r="22" fill="#1f2937" stroke="#fbbf24" stroke-width="6"/>
    <circle cx="300" cy="308" r="7" fill="#9ca3af"/>
    <circle cx="356" cy="308" r="22" fill="#1f2937" stroke="#fbbf24" stroke-width="6"/>
    <circle cx="356" cy="308" r="7" fill="#9ca3af"/>
  </g>
  <!-- mặt cười trên đầu tàu -->
  <g>
    <ellipse cx="150" cy="196" rx="12" ry="14" fill="#ffffff"/>
    <ellipse cx="188" cy="196" rx="12" ry="14" fill="#ffffff"/>
    <circle cx="152" cy="199" r="6" fill="#1f2937"/>
    <circle cx="186" cy="199" r="6" fill="#1f2937"/>
    <path d="M150 226 q19 16 38 0" stroke="#7f1d1d" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
