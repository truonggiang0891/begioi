  <polygon points="60,60 66,78 85,78 70,90 76,108 60,96 44,108 50,90 35,78 54,78" fill="#fde68a"/>
  <polygon points="345,80 350,94 365,94 353,103 358,118 345,109 332,118 337,103 325,94 340,94" fill="#fef08a"/>
