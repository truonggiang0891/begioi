  <ellipse cx="152" cy="215" rx="20" ry="26" fill="#ffffff"/>
  <ellipse cx="248" cy="215" rx="20" ry="26" fill="#ffffff"/>
  <circle cx="154" cy="220" r="12" fill="#3b0764"/>
