  <path d="M255 120 l14 -44 -46 24 z" fill="#fdf2f8"/>
  <path d="M152 112 l-4 -26 22 16 z" fill="#f9a8d4"/>
  <path d="M250 114 l6 -24 -24 14 z" fill="#f9a8d4"/>

